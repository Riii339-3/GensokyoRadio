<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gensokyo Radio Player</title>
    <script>
        async function fetchAndPlay() {
            try {
                // Gensokyo Radio APIから現在の情報を取得
                const response = await fetch('https://gensokyoradio.net/api/station/playing/');
                if (!response.ok) {
                    throw new Error('Failed to fetch API data');
                }
                const data = await response.json();

                // 最初に見つかった利用可能なストリームURLを取得
                const streams = data.SERVERINFO.STREAMS;
                let streamUrl = null;

                for (const streamId in streams) {
                    const streamInfo = streams[streamId];
                    if (streamInfo.BITRATE) { // ビットレートが設定されている場合
                        streamUrl = `https://stream.gensokyoradio.net/${streamId}.mp3`;
                        break;
                    }
                }

                if (!streamUrl) {
                    throw new Error('No available streams found');
                }

                // オーディオ要素にストリームURLを設定して再生
                const audioElement = document.getElementById('radioPlayer');
                audioElement.src = streamUrl;
                audioElement.play();
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // ページ読み込み時に実行
        window.onload = fetchAndPlay;
    </script>
</head>
<body style="background-color: white; margin: 0; padding: 0;">
    <audio id="radioPlayer" autoplay hidden></audio>
</body>
</html>
